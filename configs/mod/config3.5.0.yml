# CompassLocator Configuration
# Объединённый мод для обычного и возвратного компаса.
# Автор идеи и владелец проекта: Kasperoid
# Версия конфига: 3.4.0
# Версия мода: 3.5.0
# Привет. Как дела? :)
# Кто я? Я — основной конфиг CompassLocator.
# Что я? Я управляю экшен-баром компасов, локатор-баром и отладкой.
# Ссылки:
# - Modrinth: https://modrinth.com/mod/compasslocator-kasperoid
# - GitHub/исходники: https://github.com/kasperoid31/compasslocator/
#
# Как пользоваться этим файлом:
# 1) Меняй только значения после двоеточия.
# 2) true = включено, false = выключено.
# 3) После изменений выполни перезапусти игру или сервер.
# 4) Если не понимаешь параметр — комментарий над ним обычно объясняет, что он делает.
#
# Короткая логика мода:
# - Обычный COMPASS показывает координаты/биом/направление/время в экшен-баре.
# - RECOVERY_COMPASS показывает информацию о последней смерти.
# - Locator bar работает для обычного компаса на 1.21.6+.
# - Можно настроить, кто будет виден в locator bar: все игроки или только игроки с компасом.
#
# Конец шапки. Ниже — реальные настройки.

config-version: "3.5.0"

settings:
  # Язык сообщений и названий биомов.
  # Варианты: auto / ru / en
  language: "auto"

  # Как часто обновлять экшен-бар.
  # 20 тиков = 1 секунда. 10 тиков = 0.5 секунды.
  update-period-ticks: 10

  # Куда выводить сообщения компаса: actionbar или overlay.
  # overlay = текст справа от хотбара, в столбик.
  message-output-mode: "actionbar"

  # Смещение overlay-сообщений относительно правой части хотбара.
  overlay-x-offset: 0
  overlay-y-offset: 0
  overlay-line-spacing: 11

  # Проверять ли обе руки игрока.
  # true  = компас работает и в основной руке, и во второй руке.
  # false = только в основной руке.
  check-both-hands: true

  # Использовать короткие стороны света.
  # true  = С / Ю / В / З
  # false = Север / Юг / Восток / Запад
  use-short-directions: true

  # Сколько знаков после запятой показывать в координатах.
  # 0 = целые числа, 1-2 = дробные значения.
  coordinate-decimals: 0

  # Очищать экшен-бар, если игрок больше не держит подходящий компас.
  clear-actionbar-when-no-compass: true

  # Напоминать при входе, что сохранена точка смерти.
  send-death-reminder-on-join: true

  # Дополнительно обновлять экшен-бар во время движения.
  # Может дать чуть больше пакетов, зато строка ощущается живее.
  update-actionbar-on-move: true

  # Разделитель, если в руках сразу обычный и возвратный компас.
  dual-compass-separator: " §7║ "

  # Старый общий переключатель отладки.
  # Лучше пользоваться разделом debug ниже, но параметр оставлен для совместимости.
  debug-mode: false

compass:
  # Основной модуль обычного компаса.
  enabled: true

  # Если обычный компас привязан к магнетиту, показывать координаты магнетита после координат игрока.
  use-lodestone-target: true

  # Если магнетит сломан, продолжать показывать его последние известные координаты.
  # Если выключено, вместо координат будет только сообщение, что магнетит сломан.
  show-last-known-lodestone-when-broken: false

  # Варианты: classic / compact / minimal
  format-preset: "classic"

  # Показывать координаты игрока.
  show-coordinates: true

  # Показывать название текущего биома.
  show-biome: true

  # Показывать направление взгляда.
  show-direction: true

  # Показывать время суток.
  show-time-of-day: false

  # Показывать название мира в строке обычного компаса.
  show-world: false

recovery_compass:
  # Основной модуль возвратного компаса.
  enabled: true

  # Оставлять/возвращать компас смерти игроку после смерти, если он уже был в инвентаре.
  keep-after-death: false

  # Варианты: classic / compact / minimal
  format-preset: "classic"

  # Показывать мир, в котором была смерть.
  show-death-world: true

  # Показывать, сколько времени прошло после смерти.
  show-death-time: true

  # Показывать расстояние до точки смерти.
  show-death-distance: true

dual-mode:
  # Режим, когда игрок одновременно держит обычный и возвратный компас.
  enabled: true

  # Показывать ли часть от обычного компаса.
  show-compass-info: true

  # Показывать ли часть от возвратного компаса.
  show-recovery-info: true

  # Какой блок информации показывать первым.
  # Варианты: compass_first / recovery_first
  priority: "compass_first"

locator-bar:
  # Включить поддержку ванильного locator bar для обычного компаса.
  enabled: true

  # Дальность видимости локатор-бара.
  # 60000000 = практически весь мир.
  visible-range: 60000000

  # Насильно включать gamerule locatorBar=true в мирах, где работает мод.
  force-world-gamerule: true

  # Возвращать старые значения gamerule при выключении мода.
  restore-gamerule-on-disable: true

  targets:
    # Кто может отображаться в locator bar как цель.
    # Варианты:
    # - everyone       : видны все игроки
    # - normal_compass : видны только игроки, которые прямо сейчас держат обычный компас
    # - any_compass    : видны игроки, которые держат обычный или возвратный компас
    #
    # Примеры:
    # requirement: "everyone"
    # requirement: "normal_compass"
    # requirement: "any_compass"
    requirement: "everyone"

    # Если игрок стал подходящей/неподходящей целью, обновить зрителей ещё раз.
    refresh-all-viewers-on-change: true

    # Задержка перед дополнительным обновлением зрителей.
    refresh-viewers-delay-ticks: 1

  timings:
    # Внутренние тайминги locator bar.
    # Обычно их не нужно менять.

    # Через сколько тиков делать импульс после взятия компаса.
    equip-pulse-delay-ticks: 1

    # Через сколько тиков восстанавливать состояние после убирания компаса.
    unequip-restore-delay-ticks: 2

    # Финальное дополнительное обновление после убирания компаса.
    unequip-final-refresh-delay-ticks: 5

debug:
  # Главный переключатель расширенного debug-режима.
  enabled: false

  # Логировать игровые события: смена слота, swap, клик в инвентаре, вход, выход и т.д.
  log-events: false

  # Логировать смену состояния зрителя locator bar.
  log-viewer-state-changes: true

  # Логировать смену состояния цели locator bar.
  log-target-state-changes: true

  # Логировать все записи в waypoint_receive_range / waypoint_transmit_range.
  log-attribute-writes: false

  # Логировать полный текст экшен-бара при каждой отправке.
  log-actionbar-text: false

  # Логировать принудительные обновления зрителей.
  log-viewer-refreshes: true

  # Сколько целей максимум показывать в /cl status.
  status-targets-limit: 6
